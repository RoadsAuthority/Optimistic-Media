project_id = "iewlgqbuwcytusqpwrfw"

# Allow unauthenticated calls (Accept Invite page uses these before user is logged in)
[functions.request-verification-code]
verify_jwt = false

[functions.verify-code]
verify_jwt = false

[functions.send-twilio-message]
verify_jwt = false

# Email SMTP sender (requires authenticated user; uses JWT verification by default)
[functions.send-email]
verify_jwt = false

[auth.sms]
enable_signup = true
template = "Your code is {{ .Code }}"

[auth.sms.twilio]
enabled = true
account_sid = "env:TWILIO_ACCOUNT_SID"
auth_token = "env:TWILIO_AUTH_TOKEN"
message_service_sid = "env:TWILIO_MESSAGE_SERVICE_SID"

[auth.email.smtp]
enabled = true
host = "smtp.sendgrid.net"
port = 587
user = "apikey"
pass = "env:SENDGRID_API_KEY"
admin_email = "env:SENDGRID_FROM"
sender_name = "LeaveTrack Pro"